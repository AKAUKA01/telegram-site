<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Kanal</title>

<style>
body{
margin:0;
background:#1f4f7a;
height:100vh;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
flex-direction:column;
}

/* KATTA QIZIL STRELKA */
.arrow{
position:fixed;
top:10px;
right:15px;
font-size:160px;
color:red;
animation:pulse 0.8s infinite;
}

@keyframes pulse{
0%{opacity:1; transform:scale(1);}
50%{opacity:0.5; transform:scale(1.15);}
100%{opacity:1; transform:scale(1);}
}

/* ULTRA KATTA YOZUV BLOKLAR */
.block{
background:white;
color:black;
padding:20px 30px;
margin:12px;
border-radius:25px;
font-weight:900;
font-size:36px;
line-height:1.4;
max-width:95%;
}

.red{
color:red;
}

/* TELEGRAM TUGMA */
.btn{
margin-top:30px;
padding:25px 50px;
font-size:32px;
background:#229ED9;
color:white;
text-decoration:none;
border-radius:30px;
font-weight:bold;
animation:btnpulse 1.2s infinite;
}

@keyframes btnpulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="arrow">⬆️</div>

<div class="block">⚠️ DIQQAT</div>
<div class="block">Telegram kanalga qo‘shilish uchun</div>

<div class="block">ni bosing</div>

<a class="btn" href="https://t.me/aka_uka_oyin1">
🚀 TELEGRAM KANALGA O‘TISH
</a>

</body>
</html>
