<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Kanal</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#1f3c88,#2c5aa0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
text-align:center;
}

/* QIZIL STRELKA */
.arrow{
position:absolute;
top:80px;
right:40px;
font-size:120px;
color:red;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1; transform:scale(1);}
50%{opacity:0.4; transform:scale(1.2);}
100%{opacity:1; transform:scale(1);}
}

/* ULTRA KATTA BLOKLAR */
.block{
background:white;
color:black;
padding:25px 40px;
margin:18px;
border-radius:30px;
font-weight:900;
font-size:44px;
line-height:1.4;
max-width:95%;
}

.red{
color:red;
}

/* TELEGRAM TUGMA */
.btn{
margin-top:40px;
padding:30px 60px;
font-size:40px;
background:#229ED9;
color:white;
text-decoration:none;
border-radius:40px;
font-weight:bold;
display:inline-block;
animation:btnpulse 1.2s infinite;
}

@keyframes btnpulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="arrow">➤</div>

<div>
<div class="block">⚠ ДИҚҚАТ</div>

<div class="block">

</div>

<div class="block red">
3 НУҚТАНИ
</div>

<div class="block">
босинг
</div>

<div class="block">
Сўнг
</div>

<div class="block red">
"ОТКРЫТЬ В БРАУЗЕРЕ"
</div>

<div class="block">
ни босинг!
</div>

<a class="btn" href="https://t.me/aka_uka_oyin1">
🚀 TELEGRAM КАНАЛГА ЎТИШ
</a>
</div>

</body>
</html>
