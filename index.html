<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Kanal</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#1f3c88,#2c5aa0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
text-align:center;
}

/* Qizil strelka */
.arrow{
position:absolute;
top:65px;
right:20px;
font-size:65px;
color:red;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

/* Matn bloklari */
.block{
background:white;
color:black;
padding:14px 20px;
margin:10px;
border-radius:18px;
font-weight:700;
font-size:24px;
line-height:1.4;
max-width:90%;
}

.red{
color:red;
}

/* Telegram tugma */
.btn{
margin-top:20px;
padding:16px 35px;
font-size:24px;
background:#229ED9;
color:white;
text-decoration:none;
border-radius:25px;
font-weight:bold;
display:inline-block;
animation:btnpulse 1.5s infinite;
}

@keyframes btnpulse{
0%{transform:scale(1);}
50%{transform:scale(1.06);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="arrow">➤</div>

<div>
<div class="block">⚠ ДИҚҚАТ</div>
<div class="block">Telegram каналга қўшилиш учун</div>
<div class="block">Стрелка кўрсатаётган</div>
<div class="block red">3 НУҚТАНИ</div>
<div class="block">босинг</div>
<div class="block">Сўнг</div>
<div class="block red">"ОТКРЫТЬ В БРАУЗЕРЕ"</div>
<div class="block">ни босинг!</div>

<a class="btn" href="https://t.me/aka_uka_oyin1">
🚀 TELEGRAM КАНАЛГА ЎТИШ
</a>
</div>

</body>
</html>
