<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Kanal</title>

<style>
body{
margin:0;
background:#1f4f7a;
height:100vh;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

/* Katta qizil strelka */
.arrow{
position:fixed;
top:10px;
right:15px;
font-size:140px;
color:red;
animation:pulse 0.8s infinite;
}

/* miltillash */
@keyframes pulse{
0%{opacity:1; transform:scale(1);}
50%{opacity:0.5; transform:scale(1.1);}
100%{opacity:1; transform:scale(1);}
}

/* Oq yozuv bloklari */
.block{
background:white;
color:black;
display:inline-block;
padding:15px 25px;
margin:8px;
border-radius:20px;
font-weight:900;
font-size:28px;
line-height:1.3;
}

.small{
font-size:24px;
}

.red{
color:red;
}
</style>
</head>

<body>

<div class="arrow">⬆️</div>

<div>
<div class="block small">⚠️ DIQQAT</div><br>
<div class="block">Telegram kanalga qo‘shilish uchun</div><br>
<div class="block">Strelka ko‘rsatayotgan</div><br>
<div class="block red">3 NUQTANI</div><br>
<div class="block">bosing</div><br>
<div class="block">So‘ng</div><br>
<div class="block red">"OPEN IN BROWSER"</div><br>
<div class="block">ni bosing</div>
</div>

</body>
</html>
