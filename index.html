<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Kanal</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
font-family:Arial, sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* Qizil yonib turadigan strelka */
.arrow{
position:fixed;
top:20px;
right:20px;
font-size:80px;
color:red;
animation:blink 1s infinite, move 1s infinite alternate;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(8px);}
}

/* Katta oq blok */
.box{
background:white;
color:black;
padding:35px 30px;
border-radius:20px;
font-weight:bold;
font-size:32px;
line-height:1.5;
max-width:90%;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="arrow">⬆️</div>

<div class="box">
⚠️ DIQQAT!<br><br>
Telegram kanalga qo‘shilish uchun<br>
Yuqoridagi <span style="color:red;">3 nuqtani</span> bosing<br><br>
So‘ng <span style="color:red;">"Open in browser"</span> ni tanlang
</div>

</body>
</html>
