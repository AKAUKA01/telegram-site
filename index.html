<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Kanal</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg, #229ED9, #0f172a);
color:white;
font-family:Arial;
text-align:center;
}

.box{
padding:30px;
max-width:400px;
}

h1{
font-size:22px;
margin-bottom:15px;
}

.arrow{
font-size:60px;
margin:15px 0;
animation: bounce 1s infinite;
}

@keyframes bounce{
0%{ transform: translateY(0); }
50%{ transform: translateY(-12px); }
100%{ transform: translateY(0); }
}

.small{
font-size:16px;
opacity:0.8;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h1>⚠️ Telegram kanalga kirish uchun</h1>

<div class="arrow">⬆️</div>

<h1>Yuqoridagi 3 nuqtani bosing</h1>

<div class="small">
So‘ng <b>"Open in browser"</b> ni tanlang
</div>

</div>

</body>
</html>
