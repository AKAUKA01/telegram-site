<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Kanal</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

.container{
padding:30px;
}

h1{
font-size:26px;
margin-bottom:20px;
}

/* Qizil yonib turadigan strelka */
.arrow{
position:fixed;
top:20px;
right:20px;
font-size:60px;
color:red;
animation:blink 1s infinite, move 1s infinite alternate;
}

/* miltillash */
@keyframes blink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

/* kichik tebranish */
@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(10px);}
}

.box{
background:white;
color:black;
padding:20px;
border-radius:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="arrow">⬆️</div>

<div class="container">
<div class="box">
DIQQAT!<br><br>
Telegram kanalga qo‘shilish uchun<br>
Yuqoridagi 3 nuqtani bosing<br>
So‘ng <b>"Open in browser"</b> ni tanlang
</div>
</div>

</body>
</html>
