<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Kanal</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
flex-direction:column;
}

/* Qizil strelka */
.arrow{
position:fixed;
top:20px;
right:20px;
font-size:80px;
color:red;
animation:blink 1s infinite, move 1s infinite alternate;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(8px);}
}

/* Asosiy blok */
.box{
background:white;
color:black;
padding:35px 30px;
border-radius:20px;
font-weight:bold;
font-size:32px;
line-height:1.5;
max-width:90%;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
margin-bottom:30px;
}

.red{
color:red;
}

/* Telegram tugma */
.btn{
background:#229ED9;
color:white;
padding:18px 40px;
font-size:26px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
animation:btnpulse 1.2s infinite;
}

@keyframes btnpulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="arrow">⬆️</div>

<div class="box">
⚠️ ДИҚҚАТ!<br><br>
Telegram каналига қўшилиш учун<br>
Юқоридаги <span class="red">3 нуқтани</span> босинг<br><br>
Сўнг <span class="red">«ОТКРЫТЬ В БРАУЗЕРЕ»</span> ни танланг
</div>

<a class="btn" href="https://t.me/aka_uka_oyin1">
🚀 TELEGRAM КАНАЛГА ЎТИШ
</a>

</body>
</html>
